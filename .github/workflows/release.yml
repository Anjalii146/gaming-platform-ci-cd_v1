name: Docker Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Short Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t anjali146/gaming-platform:${{ github.ref_name }} .
          docker tag anjali146/gaming-platform:${{ github.ref_name }} anjali146/gaming-platform:${{ steps.vars.outputs.sha_short }}

      - name: Push Semantic Version Image
        run: |
          docker push anjali146/gaming-platform:${{ github.ref_name }}

      - name: Push Commit SHA Image
        run: |
          docker push anjali146/gaming-platform:${{ steps.vars.outputs.sha_short }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true